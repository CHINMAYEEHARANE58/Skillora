spring:
  datasource:
    url: jdbc:h2:file:./data/skillora;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    listener:
      auto-startup: false

skillora:
  aws:
    resume-bucket: local-skillora-resumes
  storage:
    local-enabled: true
    local-directory: ./data/resumes
  kafka:
    enabled: false
