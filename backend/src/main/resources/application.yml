server:
  port: 8080

spring:
  application:
    name: skillora-api
  datasource:
    url: jdbc:mysql://localhost:3306/skillora?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: skillora-resume-analyzer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.skillora.resume.dto
    producer:
      properties:
        spring.json.add.type.headers: false

skillora:
  jwt:
    issuer: skillora
    secret: ${JWT_SECRET:replace-this-development-secret-with-at-least-32-bytes}
    expiration-minutes: 60
    refresh-expiration-days: 14
  aws:
    region: ${AWS_REGION:us-east-1}
    resume-bucket: ${AWS_RESUME_BUCKET:skillora-resumes}
  storage:
    local-enabled: ${LOCAL_RESUME_STORAGE:false}
    local-directory: ${LOCAL_RESUME_DIRECTORY:./data/resumes}
  kafka:
    enabled: ${KAFKA_ENABLED:true}
    resume-topic: ${RESUME_ANALYSIS_TOPIC:resume-analysis-requested}
  ai:
    service-base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
    resume-analyzer-url: ${RESUME_ANALYZER_URL:http://localhost:8000/analyze-resume}
  snowflake:
    enabled: ${SNOWFLAKE_ENABLED:false}
    url: ${SNOWFLAKE_URL:}
    username: ${SNOWFLAKE_USERNAME:}
    password: ${SNOWFLAKE_PASSWORD:}
    database: ${SNOWFLAKE_DATABASE:}
    schema: ${SNOWFLAKE_SCHEMA:PUBLIC}
    warehouse: ${SNOWFLAKE_WAREHOUSE:}
